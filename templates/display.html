<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STMA Display Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 800px at 12% 18%, rgba(102,126,234,0.22), transparent 55%),
                    radial-gradient(1200px 800px at 88% 82%, rgba(43,211,255,0.18), transparent 52%),
                    linear-gradient(135deg, #0f0f23, #1a1a2e, #16213e);
        background-attachment: fixed;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #e5e7eb;
        display: flex;
        flex-direction: column;
      }
      .header {
        background: linear-gradient(90deg, rgba(15,15,35,0.88), rgba(26,26,46,0.88), rgba(22,33,62,0.88));
        color: #ffffff;
        padding: 1.6rem 1rem;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.45);
        border-bottom: 1px solid rgba(255,255,255,0.10);
        backdrop-filter: blur(14px);
      }
      .header h1 {
        font-size: 2.4rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: 0.5px;
        text-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      .content {
        flex: 1;
        display: flex;
        padding: 3rem;
        gap: 3rem;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        align-items: stretch;
      }
      .now-serving-section {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .now-serving {
        background: linear-gradient(145deg, rgba(30,30,50,0.82), rgba(20,20,35,0.82));
        border-radius: 1.25rem;
        box-shadow: 0 18px 60px rgba(0,0,0,0.45);
        padding: 3rem;
        text-align: center;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.14);
        backdrop-filter: blur(14px);
      }
      .now-serving .label {
        font-size: 1.1rem;
        font-weight: 700;
        color: rgba(229,231,235,0.72);
        text-transform: uppercase;
        letter-spacing: 0.10em;
        margin-bottom: 1.5rem;
      }
      .now-serving .token {
        font-size: 4.2rem;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: 0.02em;
        text-shadow: 0 14px 50px rgba(102,126,234,0.35);
        margin: 0;
        line-height: 1;
      }
      .upcoming-section {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .upcoming {
        background: linear-gradient(145deg, rgba(30,30,50,0.82), rgba(20,20,35,0.82));
        border-radius: 1.25rem;
        box-shadow: 0 18px 60px rgba(0,0,0,0.45);
        padding: 2rem;
        height: 100%;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.14);
        backdrop-filter: blur(14px);
      }
      .upcoming h2 {
        font-size: 1.3rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.12);
      }
      .upcoming-list {
        list-style: none;
        padding: 0;
        margin: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .upcoming-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 0.9rem;
        font-size: 1.1rem;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .token-left {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }
      .token-meta {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .token-time {
        font-weight: 900;
        min-width: 96px;
        text-align: right;
        color: #2bd3ff;
        text-shadow: 0 0 10px rgba(43,211,255,0.25);
        transition: all 0.25s ease;
      }
      .time-pill {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.4rem;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: rgba(43,211,255,0.10);
        border: 1px solid rgba(43,211,255,0.22);
      }
      .time-pill.sla-risk {
        background: rgba(231,76,60,0.16);
        border: 1px solid rgba(231,76,60,0.35);
        color: #ffb3ab;
        text-shadow: none;
      }
      .time-pill.priority {
        background: rgba(231,76,60,0.16);
        border: 1px solid rgba(231,76,60,0.35);
        color: #ffb3ab;
        text-shadow: none;
      }
      .upcoming-list li:hover {
        background: rgba(255,255,255,0.075);
        transform: translateX(5px);
      }
      .upcoming-list .token-number {
        color: #2bd3ff;
        font-weight: 900;
        font-size: 1.2rem;
      }
      .upcoming-list .service-name {
        color: rgba(229,231,235,0.72);
        font-weight: 600;
      }
      .no-tokens {
        text-align: center;
        color: rgba(229,231,235,0.70);
        font-style: italic;
        padding: 3rem;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .footer {
        background: rgba(15,15,35,0.75);
        color: rgba(229,231,235,0.85);
        padding: 1.5rem;
        text-align: center;
        display: flex;
        justify-content: center;
        gap: 2rem;
        font-size: 0.9rem;
        border-top: 1px solid rgba(255,255,255,0.10);
        backdrop-filter: blur(14px);
      }
      .badge {
        background: linear-gradient(90deg, #7c5cff 0%, #2bd3ff 100%);
        color: #ffffff;
        padding: 0.35rem 0.7rem;
        font-size: 0.75rem;
        font-weight: 800;
        border-radius: 999px;
      }
      @media (max-width: 768px) {
        .content {
          flex-direction: column;
          padding: 2rem 1rem;
          gap: 2rem;
        }
        .header h1 {
          font-size: 2rem;
        }
        .now-serving {
          padding: 2rem;
        }
        .now-serving .token {
          font-size: 3rem;
        }
        .upcoming {
          padding: 1.5rem;
        }
        .upcoming-list li {
          padding: 0.75rem 1rem;
          font-size: 1rem;
        }
        .footer {
          flex-direction: column;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1><i class="bi bi-display me-2"></i>Service Token Display</h1>
    </div>

    <div class="content">
      <div class="now-serving-section">
        <div class="now-serving">
          <div class="label">Now Serving</div>
          <div class="token" id="now-serving">-</div>
        </div>
      </div>

      <div class="upcoming-section">
        <div class="upcoming">
          <h2><i class="bi bi-list-ol me-2"></i>Next Tokens</h2>
          <ul class="upcoming-list" id="upcoming">
            <li class="no-tokens">No tokens in queue</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="footer">
      <div><span class="badge">Auto-refresh: 5 seconds</span></div>
      <div id="updated">Updated: -</div>
    </div>

    <script>
      function render(payload) {
        const now = payload.now_serving && payload.now_serving.token_number ? payload.now_serving.token_number : '-';
        document.getElementById('now-serving').textContent = now;

        const ul = document.getElementById('upcoming');
        ul.innerHTML = '';
        const items = (payload.upcoming || []).slice(0, 5);
        if (!items.length) {
          const li = document.createElement('li');
          li.className = 'no-tokens';
          li.textContent = 'No tokens in queue';
          ul.appendChild(li);
        } else {
          items.forEach((t, index) => {
            const li = document.createElement('li');

            let timeText = '-';
            let pillClass = '';
            if (t.awaiting_assignment) {
              timeText = 'Awaiting';
            } else if (t.is_priority) {
              timeText = 'Priority';
              pillClass = 'priority';
            } else if (t.estimated_start_time) {
              try {
                timeText = new Date(t.estimated_start_time).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
              } catch (e) {
                timeText = '-';
              }
            }

            const slaCls = t.sla_risk ? 'sla-risk' : '';
            const pill = `<span class="time-pill ${pillClass} ${slaCls}"><span>${timeText}</span></span>`;

            li.innerHTML = `
              <div class="token-left">
                <div class="token-meta">
                  <span class="token-number">${t.token_number}</span>
                  <span class="service-name">${t.service_name}</span>
                </div>
              </div>
              <div class="token-time">${pill}</div>
            `;
            ul.appendChild(li);
          });
        }

        document.getElementById('updated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      }

      async function fetchData() {
        try {
          const res = await fetch('/api/display_data');
          if (!res.ok) return;
          const data = await res.json();
          render(data);
        } catch (e) {}
      }

      fetchData();
      setInterval(fetchData, 5000);
    </script>
  </body>
</html>
